files:
    # Application source
    - "app/**"
    - "public/**"

    # Root config files
    - ".gitignore"
    - ".npmrc"
    - ".prettierignore"
    - ".graphqlrc.ts"
    - "components.json"
    - "env.d.ts"
    - "eslint.config.js"
    - "prettier.config.js"
    - "react-router.config.ts"
    - "server.ts"
    - "tsconfig.json"
    - "vite.config.ts"
    - "package.json"
    - ".env.example"

    # Exclude secrets and lock files
    - "!.env"
    - "!.env.local"
    - "!.dev.vars"
    - "!bun.lock"
    - "!package-lock.json"
